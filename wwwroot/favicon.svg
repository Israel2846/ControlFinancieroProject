<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="512" height="512" role="img" aria-label="Control Financiero">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d6efd"/>
      <stop offset="1" stop-color="#20c997"/>
    </linearGradient>
  </defs>

  <!-- fondo -->
  <rect width="64" height="64" rx="10" fill="url(#g)"/>

  <!-- panel claro -->
  <rect x="8" y="12" width="48" height="28" rx="4" fill="#ffffff" fill-opacity="0.08"/>

  <!-- barras (gráfico) -->
  <rect x="14" y="30" width="5" height="10" rx="1" fill="#ffc107"/>
  <rect x="21" y="26" width="5" height="14" rx="1" fill="#fd7e14"/>
  <rect x="28" y="20" width="5" height="20" rx="1" fill="#0d6efd"/>
  <rect x="35" y="24" width="5" height="16" rx="1" fill="#6610f2"/>

  <!-- moneda simplificada (círculo) -->
  <circle cx="48" cy="20" r="6" fill="#ffd54d" stroke="#ddb24a" stroke-width="0.6"/>

  <!-- check de control -->
  <path d="M38 38 L43 43 L53 30" fill="none" stroke="#198754" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>